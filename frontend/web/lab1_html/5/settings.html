<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>IODocs - Settings (HTML5)</title>
</head>
<body>
    <header>
        <h1><a href="index.html">IODOCS</a> - User Settings</h1>
        <hr>
    </header>

    <form action="save_settings.php" method="post">
        <table>
            <tr>
                <th colspan="3">Account Preferences</th>
            </tr>
            <tr>
                <td rowspan="3">
                    <img src="user_avatar.png" alt="User" width="100" height="100" title="Profile Picture"><br>
                    <strong>User Admin</strong>
                </td>
                <td>
                    <fieldset>
                        <legend><strong>Display</strong></legend>
                        <p>
                            Font Size (px): 
                            <input type="number" name="f_size" min="10" max="30" step="2" value="14">
                        </p>
                    </fieldset>
                </td>
                <td>
                    <fieldset>
                        <legend><strong>Notifications</strong></legend>
                        <input type="checkbox" name="n1" checked> Desktop<br>
                        <input type="checkbox" name="n2"> Email Notifications
                    </fieldset>
                </td>
            </tr>
            <tr>
                <td>
                    <label>Preferred Languages:</label><br>
                    <select name="langs" multiple size="3">
                        <option value="ro" selected>Română</option>
                        <option value="en" selected>English</option>
                        <option value="fr">Français</option>
                    </select>
                </td>
                <td>
                    <label>Theme Selection:</label><br>
                    <input type="radio" name="th" value="l" checked> Light
                    <input type="radio" name="th" value="d"> Dark
                </td>
            </tr>
            <tr>
                <td colspan="2">
                    Email Address: <input type="email" name="mail" size="30" value="user@scs.ubbcluj.ro"><br><br>
                    Last Login: <input type="date" name="last_log" value="2026-03-09" readonly>
                </td>
            </tr>
            <tr>
                <td><strong>Status: Active</strong></td>
                <td colspan="2">
                    <input type="submit" value="Save Changes">
                    <input type="reset" value="Clear">
                </td>
            </tr>
        </table>
    </form>

    <footer>
        <p><a href="index.html">Back to Dashboard</a></p>
    </footer>
</body>
</html>
