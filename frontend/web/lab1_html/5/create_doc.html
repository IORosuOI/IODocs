<!DOCTYPE html>
<html lang="ro">
    <head>
        <meta charset="UTF-8">
        <title>IODocs - Create (HTML5)</title>
    </head>

    <body>
        <center>
            <h1 align="left"><a href="index.html" name="top">IODOCS</a> - Add New Document</h1>
            <hr>

            <form action="upload.php" method="post">
                <fieldset>
                    <legend><b>General Information</b></legend>
                    
                    <p>
                        <label>Document Title:</label><br>
                        <input type="text" name="doc_title" size="40" maxlength="50" value="Document Nou">
                    </p>

                    <p>
                        <label>Unique ID (Read-Only):</label>
                        <input type="text" name="doc_id" value="DOC-2026-001" readonly>
                    </p>

                    <p>
                        <label>Priority (1-5):</label>
                        <input type="number" name="priority" min="1" max="5" step="1" value="3">
                    </p>

                    <p>
                        <label>Category:</label>
                        <select name="category" multiple>
                            <option value="sc" selected>Școală</option>
                            <option value="mu">Muncă</option>
                            <option value="pe">Personal</option>
                            <option value="fi">Finanțe</option>
                            <option value="pr">Început de Proiect</option>
                        </select>
                    </p>
                </fieldset>

                <br>

                <fieldset>
                    <legend><b>Settings and Visibility</b></legend>
                    
                    <p>
                        <label>Target Completion Date:</label>
                        <input type="date" name="target_date">
                    </p>

                    <p>
                        Access level: 
                        <input type="radio" name="access" value="p" checked> Private
                        <input type="radio" name="access" value="s"> Shared
                        <input type="radio" name="access" value="pub"> Public
                    </p>

                    <p>
                        Options:
                        <input type="checkbox" name="opt1" value="sync" checked> Cloud Sync
                        <input type="checkbox" name="opt2" value="prot"> Password Protected
                        <input type="checkbox" name="opt3" value="notif" disabled> Email Notifications
                    </p>

                    <p>
                        Detailed Description:<br>
                        <textarea name="description" rows="6" cols="50">Enter document details here...</textarea>
                    </p>
                </fieldset>

                <br>

                <table border="1" width="50%" bgcolor="#f0f0f0">
                    <tr>
                        <td colspan="2" align="center"><b>Data Confirmation</b></td>
                    </tr>
                    <tr>
                        <td align="right">Finish:</td>
                        <td>
                            <input type="submit" value="Save Document">
                            <input type="reset" value="Reset" disabled>
                        </td>
                    </tr>
                </table>
            </form>

            <p>
                <a href="index.html" target="_self">Back to Dashboard</a>
            </p>
        </center>
    </body>
</html>
